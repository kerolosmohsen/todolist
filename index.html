<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متتبع الإنتاجية الروحية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display:flex; gap:12px; align-items:center; justify-content:flex-end;">
                <a href="main.html" class="btn" style="text-decoration:none; padding:8px 12px; border-radius:8px;">⬅ افتح لوحة الإنتاجية</a>
            </div>
            <h1 class="title">
                📖 متتبع الإنتاجية الروحية
            </h1>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">مكتمل</div>
                <div class="stat-value" id="completedCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">متبقي</div>
                <div class="stat-value" id="remainingCount">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">نسبة الإنجاز</div>
                <div class="stat-value" id="completionRate">0%</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="chapters">
                📖 الإصحاحات
            </div>
            <div class="tab" data-tab="prayer">
                🙏 الصلاة
            </div>
            <div class="tab" data-tab="agpeya">
                📿 الأجبية
            </div>
        </div>

        <div class="month-selector">
            <select id="monthSelect">
                <option value="0">يناير</option>
                <option value="1">فبراير</option>
                <option value="2">مارس</option>
                <option value="3">إبريل</option>
                <option value="4">مايو</option>
                <option value="5">يونيو</option>
                <option value="6">يوليو</option>
                <option value="7">أغسطس</option>
                <option value="8">سبتمبر</option>
                <option value="9">أكتوبر</option>
                <option value="10">نوفمبر</option>
                <option value="11">ديسمبر</option>
            </select>
        </div>

        <div class="days-grid" id="daysGrid"></div>

        <div class="summary">
            <h3>📊 ملخص الشهر</h3>
            <div class="summary-item">
                <span>أيام مكتملة</span>
                <span id="summaryCompleted">0 يوم</span>
            </div>
            <div class="summary-item">
                <span>أيام لم تكتمل</span>
                <span id="summaryMissed">30 يوم</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
